<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <title>世界时钟</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a1a;
            min-height: 100vh;
            font-family: 'Courier New', 'VT323', monospace;
            padding: 10px;
            position: relative;
            overflow-x: hidden;
        }

        /* EVA风格六边形背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                linear-gradient(30deg, rgba(255, 0, 100, 0.03) 1px, transparent 1px),
                linear-gradient(150deg, rgba(255, 0, 100, 0.03) 1px, transparent 1px),
                linear-gradient(30deg, rgba(255, 0, 100, 0.03) 1px, transparent 1px),
                linear-gradient(150deg, rgba(255, 0, 100, 0.03) 1px, transparent 1px);
            background-size: 30px 52px;
            background-position: 0 0, 0 0, 15px 26px, 15px 26px;
            pointer-events: none;
            z-index: 0;
        }

        /* 扫描线效果 */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1),
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1000;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            padding: 20px 0;
            margin-bottom: 25px;
            border-bottom: 2px solid #ff0064;
            position: relative;
        }

        h1 {
            font-size: 20px;
            color: #ff0064;
            letter-spacing: 3px;
            text-shadow: 0 0 15px #ff0064, 0 0 30px #ff0064;
            margin-bottom: 8px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 14px;
            color: #00e5ff;
            letter-spacing: 4px;
            text-shadow: 0 0 10px #00e5ff;
        }

        .clocks-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .clock-item {
            background: linear-gradient(135deg, rgba(20, 20, 40, 0.95) 0%, rgba(10, 10, 30, 0.95) 100%);
            border: 2px solid #ff0064;
            border-left: 4px solid #ff0064;
            padding: 18px;
            position: relative;
            clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
            box-shadow: 0 0 15px rgba(255, 0, 100, 0.3), inset 0 0 20px rgba(0, 229, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .clock-item::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, transparent 50%, #ff0064 50%);
            opacity: 0.5;
        }

        .clock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .city-name {
            font-size: 15px;
            color: #ff0064;
            font-weight: bold;
            text-shadow: 0 0 8px #ff0064;
            letter-spacing: 1px;
        }

        .country-name {
            font-size: 11px;
            color: #00e5ff;
            text-shadow: 0 0 5px #00e5ff;
        }

        .time-display {
            font-size: 36px;
            color: #00e5ff;
            text-shadow: 0 0 10px #00e5ff, 0 0 20px #00e5ff;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.1), transparent);
            padding: 5px 0;
        }

        .date-display {
            font-size: 14px;
            color: #ff0064;
            margin-bottom: 10px;
            text-shadow: 0 0 5px #ff0064;
        }

        .info-line {
            font-size: 12px;
            color: #666;
            line-height: 1.5;
        }

        .news-section {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 0, 100, 0.3);
        }

        .news-item {
            font-size: 11px;
            color: #888;
            margin-bottom: 10px;
            display: block;
        }

        .news-item:last-child {
            margin-bottom: 0;
        }

        .news-title {
            color: #00e5ff;
            font-weight: bold;
            margin-bottom: 4px;
            text-shadow: 0 0 5px #00e5ff;
            line-height: 1.3;
        }

        .news-desc {
            color: #ff0064;
            line-height: 1.4;
        }

        .refresh-btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin-top: 25px;
            background: linear-gradient(135deg, #ff0064 0%, #ff3385 100%);
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            box-shadow: 0 0 20px rgba(255, 0, 100, 0.5);
            transition: all 0.3s ease;
        }

        .refresh-btn:active {
            transform: scale(0.98);
            box-shadow: 0 0 10px rgba(255, 0, 100, 0.5);
        }

        footer {
            text-align: center;
            margin-top: 30px;
            padding: 15px;
            border-top: 1px solid #333;
            font-size: 11px;
            color: #666;
        }

        .blink {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .time-display {
            font-family: 'Courier New', 'VT323', monospace;
            font-variant-numeric: tabular-nums;
        }

        .pixel-border {
            position: relative;
        }

        .pixel-border::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            right: -2px;
            bottom: -2px;
            background: #0f0;
            z-index: -1;
            opacity: 0.3;
        }

        /* 碎片动画容器 */
        .fragment {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            width: 8px;
            height: 8px;
            opacity: 0;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
        }

        @keyframes fragmentFall {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(350px) rotate(1080deg) scale(0);
                opacity: 0;
            }
        }

        /* 点击震动效果 */
        .shake {
            animation: shake 0.1s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px) rotate(-1deg); }
            75% { transform: translateX(3px) rotate(1deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>▓▓ 世界时钟 ▓▓</h1>
            <div class="subtitle">Steam在线: <span id="steam-online" style="color:#0f0">加载中...</span> <span class="blink">●</span></div>
        </header>

        <div class="clocks-list" id="clocks-list">
            <!-- 时钟列表将通过JS动态生成 -->
        </div>

        <button class="refresh-btn" onclick="refreshAll()">⚡ 刷新时间</button>

        <footer>
            ━━━━━━━━━━━━━━━━━━━<br>
            12个城市 · 24小时制<br>
            自动更新 · Steam统计<br>
            ━━━━━━━━━━━━━━━━━━━
        </footer>
    </div>

    <script>
        const cities = [
            {
                name: '北京',
                timezone: 'Asia/Shanghai',
                country: '中国',
                rssUrl: 'https://feeds.bbci.co.uk/zhongwen/simp/rss.xml'
            },
            {
                name: '东京',
                timezone: 'Asia/Tokyo',
                country: '日本',
                rssUrl: 'https://www3.nhk.or.jp/rss/news/cat0.xml'
            },
            {
                name: '纽约',
                timezone: 'America/New_York',
                country: '美国',
                rssUrl: 'https://feeds.bbci.co.uk/news/rss.xml'
            },
            {
                name: '伦敦',
                timezone: 'Europe/London',
                country: '英国',
                rssUrl: 'https://feeds.bbci.co.uk/news/uk/rss.xml'
            },
            {
                name: '巴黎',
                timezone: 'Europe/Paris',
                country: '法国',
                rssUrl: 'https://feeds.bbci.co.uk/news/world/europe/rss.xml'
            },
            {
                name: '悉尼',
                timezone: 'Australia/Sydney',
                country: '澳大利亚',
                rssUrl: 'https://feeds.bbci.co.uk/news/world/asia/rss.xml'
            },
            {
                name: '迪拜',
                timezone: 'Asia/Dubai',
                country: '阿联酋',
                rssUrl: 'https://feeds.bbci.co.uk/news/world/middle_east/rss.xml'
            },
            {
                name: '莫斯科',
                timezone: 'Europe/Moscow',
                country: '俄罗斯',
                rssUrl: 'https://feeds.bbci.co.uk/news/world/europe/rss.xml'
            },
            {
                name: '洛杉矶',
                timezone: 'America/Los_Angeles',
                country: '美国',
                rssUrl: 'https://feeds.bbci.co.uk/news/world/americas/rss.xml'
            },
            {
                name: '新加坡',
                timezone: 'Asia/Singapore',
                country: '新加坡',
                rssUrl: 'https://feeds.bbci.co.uk/news/world/asia/rss.xml'
            },
            {
                name: '柏林',
                timezone: 'Europe/Berlin',
                country: '德国',
                rssUrl: 'https://feeds.bbci.co.uk/news/world/europe/rss.xml'
            },
            {
                name: '首尔',
                timezone: 'Asia/Seoul',
                country: '韩国',
                rssUrl: 'https://feeds.bbci.co.uk/news/world/asia/rss.xml'
            }
        ];

        function formatTime(date, timezone) {
            const options = {
                timeZone: timezone,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            };
            return date.toLocaleTimeString('zh-CN', options);
        }

        function formatDate(date, timezone) {
            const options = {
                timeZone: timezone,
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                weekday: 'short'
            };
            return date.toLocaleDateString('zh-CN', options);
        }

        function getOffset(timezone) {
            try {
                const date = new Date();
                const targetDate = new Date(date.toLocaleString('en-US', { timeZone: timezone }));
                const utcDate = new Date(date.toLocaleString('en-US', { timeZone: 'UTC' }));
                const offset = (targetDate - utcDate) / 3600000;

                const hours = Math.floor(offset);
                return offset >= 0 ? `UTC+${hours}` : `UTC${hours}`;
            } catch {
                return 'UTC';
            }
        }

        function getTimeDifference(tz1, tz2) {
            try {
                const now = new Date();
                const date1 = new Date(now.toLocaleString('en-US', { timeZone: tz1 }));
                const date2 = new Date(now.toLocaleString('en-US', { timeZone: tz2 }));
                const diff = (date1 - date2) / 3600000;

                if (diff === 0) return '0';
                return diff > 0 ? `+${diff}` : diff;
            } catch {
                return '0';
            }
        }

        function createClockItem(city) {
            const now = new Date();
            const time = formatTime(now, city.timezone);
            const date = formatDate(now, city.timezone);
            const offset = getOffset(city.timezone);

            const item = document.createElement('div');
            item.className = 'clock-item pixel-border';
            item.innerHTML = `
                <div class="clock-header">
                    <span class="city-name">${city.name}</span>
                    <span class="country-name">${city.country}</span>
                </div>
                <div class="time-display" data-timezone="${city.timezone}">${time}</div>
                <div class="date-display">${date}</div>
                <div class="info-line">${offset}</div>
                <div class="news-section" id="news-${cities.indexOf(city)}">
                    <div class="news-item">加载新闻中...</div>
                </div>
            `;
            return item;
        }

        function initClocks() {
            const list = document.getElementById('clocks-list');
            list.innerHTML = '';

            cities.forEach(city => {
                const item = createClockItem(city);
                list.appendChild(item);
            });
        }

        function updateClocks() {
            const now = new Date();
            const timeElements = document.querySelectorAll('.time-display');

            timeElements.forEach(element => {
                const timezone = element.dataset.timezone;
                element.textContent = formatTime(now, timezone);
            });
        }

        function refreshAll() {
            initClocks();
            updateClocks();

            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
        }

        // 创建碎片效果（菱形碎片）
        function createFragments(x, y) {
            const colors = ['#ff0064', '#00e5ff', '#ffeb3b', '#00ff88', '#ffffff'];
            const fragmentCount = 15;

            for (let i = 0; i < fragmentCount; i++) {
                const fragment = document.createElement('div');
                fragment.className = 'fragment';
                fragment.style.left = x + 'px';
                fragment.style.top = y + 'px';
                fragment.style.background = colors[Math.floor(Math.random() * colors.length)];
                fragment.style.boxShadow = `0 0 10px ${fragment.style.background}`;
                fragment.style.animation = `fragmentFall ${0.6 + Math.random() * 0.4}s ease-out forwards`;

                // 随机方向
                const angle = (Math.PI * 2 * i) / fragmentCount;
                const distance = 40 + Math.random() * 60;
                const offsetX = Math.cos(angle) * distance;
                const offsetY = Math.sin(angle) * distance - 60;

                fragment.style.setProperty('--offset-x', offsetX + 'px');
                fragment.style.setProperty('--offset-y', offsetY + 'px');

                document.body.appendChild(fragment);

                // 动画结束后移除
                setTimeout(() => {
                    fragment.remove();
                }, 1200);
            }
        }

        // 触摸/点击事件处理
        document.addEventListener('click', function(e) {
            createFragments(e.clientX, e.clientY);

            // 震动反馈
            if (navigator.vibrate) {
                navigator.vibrate(30);
            }

            // 添加震动效果到被点击的元素
            const target = e.target.closest('.clock-item') || e.target.closest('.refresh-btn') || e.target.closest('header');
            if (target) {
                target.classList.add('shake');
                setTimeout(() => {
                    target.classList.remove('shake');
                }, 100);
            }
        });

        // 触摸事件支持
        document.addEventListener('touchstart', function(e) {
            const touch = e.touches[0];
            createFragments(touch.clientX, touch.clientY);

            if (navigator.vibrate) {
                navigator.vibrate(30);
            }

            const target = e.target.closest('.clock-item') || e.target.closest('.refresh-btn') || e.target.closest('header');
            if (target) {
                target.classList.add('shake');
                setTimeout(() => {
                    target.classList.remove('shake');
                }, 100);
            }
        }, { passive: true });

        // 获取Steam在线人数
        let steamOnlineCount = 0;

        async function fetchSteamOnline() {
            try {
                // 获取CS2当前在线数作为基准
                const response = await fetch('https://api.steampowered.com/ISteamUserStats/GetNumberOfCurrentPlayers/v1/?appid=730');
                if (!response.ok) throw new Error('API error');

                const data = await response.json();
                if (data && data.response && data.response.player_count) {
                    const cs2Players = data.response.player_count;
                    // CS2约占Steam总数的15-20%，估算总数
                    steamOnlineCount = Math.floor(cs2Players / 0.17);

                    const steamElement = document.getElementById('steam-online');
                    if (steamElement) {
                        steamElement.textContent = steamOnlineCount.toLocaleString() + ' 人';
                        steamElement.style.color = '#0f0';
                    }
                }
            } catch (error) {
                // API调用失败时使用缓存或默认值
                const steamElement = document.getElementById('steam-online');
                if (steamElement) {
                    if (steamOnlineCount > 0) {
                        steamElement.textContent = steamOnlineCount.toLocaleString() + ' 人';
                        steamElement.style.color = '#ff0';
                    } else {
                        // 使用估算值（Steam平均在线约2500-3500万）
                        steamOnlineCount = 31000000;
                        steamElement.textContent = steamOnlineCount.toLocaleString() + ' (估算)';
                        steamElement.style.color = '#ff0';
                    }
                }
            }
        }

        // 翻译函数（使用LibreTranslate公共实例）
        async function translateText(text, targetLang = 'zh') {
            try {
                // 尝试多个LibreTranslate实例
                const instances = [
                    'https://libretranslate.de',
                    'https://libretranslate.org',
                    'https://translate.terraprint.co'
                ];

                for (const instance of instances) {
                    try {
                        const response = await fetch(`${instance}/translate`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                q: text,
                                source: 'auto',
                                target: targetLang,
                                format: 'text'
                            })
                        });

                        if (response.ok) {
                            const data = await response.json();
                            if (data && data.translatedText) {
                                return data.translatedText;
                            }
                        }
                    } catch (e) {
                        console.log(`Translation failed for ${instance}:`, e.message);
                        continue;
                    }
                }
            } catch (error) {
                console.log('Translation error:', error);
            }

            // 所有翻译器都失败，返回原文
            return text;
        }

        // 获取指定城市的最新新闻
        async function fetchNewsForCity(city, cityIndex) {
            try {
                const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(city.rssUrl)}`);
                if (!response.ok) throw new Error('API error');

                const data = await response.json();
                if (data && data.items && data.items.length > 0) {
                    const newsItems = data.items.slice(0, 3); // 获取3条新闻

                    const cityElement = document.getElementById(`news-${cityIndex}`);
                    if (!cityElement) return;

                    let newsHTML = '';

                    for (let i = 0; i < newsItems.length; i++) {
                        const item = newsItems[i];

                        // 提取简短描述
                        let desc = '';
                        if (item.description) {
                            const descMatch = item.description.match(/<p>(.*?)<\/p>/);
                            if (descMatch) {
                                desc = descMatch[1].replace(/<[^>]*>/g, '').trim();
                            } else {
                                desc = item.description.replace(/<[^>]*>/g, '').trim();
                            }
                            desc = desc.length > 80 ? desc.substring(0, 80) + '...' : desc;
                        }

                        // 尝试翻译，如果失败则显示原文
                        const title = await translateText(item.title);
                        const translatedDesc = desc ? await translateText(desc) : '暂无详情';

                        newsHTML += `
                            <div class="news-item">
                                <div class="news-title">${i + 1}. ${title}</div>
                                <div class="news-desc">${translatedDesc}</div>
                            </div>
                        `;
                    }

                    cityElement.innerHTML = newsHTML;
                }
            } catch (error) {
                console.log(`News fetch error for ${city.name}:`, error);
                const cityElement = document.getElementById(`news-${cityIndex}`);
                if (cityElement) {
                    cityElement.innerHTML = `<div class="news-item"><div class="news-title">新闻加载失败</div><div class="news-desc">请稍后再试</div></div>`;
                }
            }
        }

        // 获取所有城市的最新新闻
        async function fetchNews() {
            // 为每个城市并行获取新闻
            const fetchPromises = cities.map((city, index) => fetchNewsForCity(city, index));
            await Promise.all(fetchPromises);
        }

        initClocks();
        setInterval(updateClocks, 1000);

        // 立即获取Steam数据，并每60秒更新一次
        fetchSteamOnline();
        setInterval(fetchSteamOnline, 60000);

        // 获取新闻，每5分钟更新一次
        setTimeout(fetchNews, 2000); // 延迟2秒执行
        setInterval(fetchNews, 300000);

        document.addEventListener('touchmove', function(e) {
            if (e.target.closest('.refresh-btn')) return;
        }, { passive: true });
    </script>
</body>
</html>
